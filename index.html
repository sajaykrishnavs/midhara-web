<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Midhara India</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }

        .launch-box {
            background: rgba(0,0,0,0.4);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .btn-custom {
            background: #fff;
            color: #000;
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="launch-box">
        <h1 class="display-4 fw-bold">Midhara.... 🚀 Coming Soon</h1>
        <p class="lead mt-3">
            Our new website is launching soon. Stay tuned!
        </p>

        <button class="btn btn-custom mt-4">
            Yes, Midhara...
        </button>
    </div>

</body>
</html>
